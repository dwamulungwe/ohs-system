services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ohs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ohs}
      POSTGRES_DB: ${POSTGRES_DB:-ohs}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ohs} -d ${POSTGRES_DB:-ohs}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
